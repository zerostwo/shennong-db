resource_schema:
  kind: Dataset
  title: TCGA TARGET GTEx Toil RNA-seq complete cohort
  summary: Harmonized bulk RNA-seq expression with phenotype, category, TCGA survival, and GENCODE v23 gene mapping.
  use_when: Compare expression across TCGA, TARGET, and GTEx cohorts or join TCGA expression with survival endpoints.
  organism: human
  data_model: bulk
  assays: [rna]
  dimensions:
    features: 60498
    samples: 19131
  fields: [sample_id, ensembl_gene_id, log2_tpm_plus_0.001]
  reference:
    assembly: GRCh38.p3
    gene_annotation: GENCODE v23
    identifier: versioned Ensembl gene ID
    canonical_cross_dataset_key: Ensembl gene stable ID without version suffix
  feature_identifier: GENCODE v23 Ensembl gene ID with version suffix
  example_feature: ENSG00000198492.14
  supported_context: [disease, primary_site, sample_type, study, detailed_category]
  analysis_capabilities:
    ready: [gene_expression_by_sample, tumor_normal_expression_by_cancer, survival_expression, gene_resolution]
    requires_additional_resources: {}
resource_spec:
  backend: local
  operations: [expression, survival_expression]
storage:
  backend: local
  permissions:
    visibility: public
    read_scopes: [resource.read]
