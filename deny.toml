[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
unmaintained = "workspace"
yanked = "deny"

[licenses]
version = 2
allow = ["MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-3.0", "CDLA-Permissive-2.0", "Zlib", "MPL-2.0"]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
