services:
  shennong-db:
    image: ${SHENNONG_IMAGE:-zerostwo/shennong-db:0.7.0}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "${SHENNONG_BIND_ADDRESS:-127.0.0.1}:${SHENNONG_PORT:-18080}:8000"
    volumes:
      - ${SHENNONG_DATA_PATH:-./data}:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
