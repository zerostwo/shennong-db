services:
  shennong-db:
    image: ${SHENNONG_IMAGE:-zerostwo/shennong-db:latest}
    restart: unless-stopped
    environment:
      SHENNONG_ADMIN_API_KEY: ${SHENNONG_ADMIN_API_KEY:-}
      SHENNONG_JWT_SECRET: ${SHENNONG_JWT_SECRET:-}
      SHENNONG_JWT_SECRET_PREVIOUS: ${SHENNONG_JWT_SECRET_PREVIOUS:-}
      SHENNONG_CORS_ORIGINS: ${SHENNONG_CORS_ORIGINS:-}
      SHENNONG_MAX_BODY_BYTES: ${SHENNONG_MAX_BODY_BYTES:-1048576}
      SHENNONG_REQUEST_TIMEOUT_SECS: ${SHENNONG_REQUEST_TIMEOUT_SECS:-30}
      SHENNONG_MAX_CONCURRENCY: ${SHENNONG_MAX_CONCURRENCY:-64}
      SHENNONG_QUERY_MAX_CONCURRENCY: ${SHENNONG_QUERY_MAX_CONCURRENCY:-8}
      SHENNONG_QUERY_RATE_LIMIT_PER_MINUTE: ${SHENNONG_QUERY_RATE_LIMIT_PER_MINUTE:-120}
      SHENNONG_DOWNLOAD_RATE_LIMIT_PER_MINUTE: ${SHENNONG_DOWNLOAD_RATE_LIMIT_PER_MINUTE:-60}
      SHENNONG_TRUST_PROXY_HEADERS: ${SHENNONG_TRUST_PROXY_HEADERS:-0}
      SHENNONG_ENABLE_HSTS: ${SHENNONG_ENABLE_HSTS:-0}
      SHENNONG_COOKIE_SECURE: ${SHENNONG_COOKIE_SECURE:-0}
      SHENNONG_PROVIDER_ALLOW_UNVERIFIED: ${SHENNONG_PROVIDER_ALLOW_UNVERIFIED:-0}
      SHENNONG_DOWNLOAD_CONCURRENCY: ${SHENNONG_DOWNLOAD_CONCURRENCY:-8}
      SHENNONG_DOWNLOAD_TIMEOUT_SECS: ${SHENNONG_DOWNLOAD_TIMEOUT_SECS:-300}
      SHENNONG_MAX_DOWNLOAD_BYTES: ${SHENNONG_MAX_DOWNLOAD_BYTES:-10737418240}
      SHENNONG_MAX_UPLOAD_BYTES: ${SHENNONG_MAX_UPLOAD_BYTES:-53687091200}
      SHENNONG_DOWNLOAD_PROXY: ${SHENNONG_DOWNLOAD_PROXY:-}
      SHENNONG_TILEDB_MAX_CONCURRENCY: ${SHENNONG_TILEDB_MAX_CONCURRENCY:-4}
      SHENNONG_TILEDB_TIMEOUT_SECS: ${SHENNONG_TILEDB_TIMEOUT_SECS:-30}
      SHENNONG_TILEDB_MAX_STDOUT_BYTES: ${SHENNONG_TILEDB_MAX_STDOUT_BYTES:-10485760}
      SHENNONG_TILEDB_MAX_STDERR_BYTES: ${SHENNONG_TILEDB_MAX_STDERR_BYTES:-65536}
      SHENNONG_CLICKHOUSE_CONNECT_TIMEOUT_SECS: ${SHENNONG_CLICKHOUSE_CONNECT_TIMEOUT_SECS:-3}
      SHENNONG_CLICKHOUSE_TIMEOUT_SECS: ${SHENNONG_CLICKHOUSE_TIMEOUT_SECS:-15}
      SHENNONG_CLICKHOUSE_MAX_IDLE_PER_HOST: ${SHENNONG_CLICKHOUSE_MAX_IDLE_PER_HOST:-8}
      SHENNONG_CLICKHOUSE_CACHE_TTL_DAYS: ${SHENNONG_CLICKHOUSE_CACHE_TTL_DAYS:-30}
      SHENNONG_CLICKHOUSE_CACHE_MAX_BYTES: ${SHENNONG_CLICKHOUSE_CACHE_MAX_BYTES:-1073741824}
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "${SHENNONG_BIND_ADDRESS:-127.0.0.1}:${SHENNONG_PORT:-18080}:8000"
    volumes:
      - ${SHENNONG_DATA_PATH:-./data}:/data
  shennong-db-web:
    image: shennong-db-web:0.5.2
    build: ./web
    profiles: ["development-web"]
    restart: unless-stopped
    depends_on:
      - shennong-db
    environment:
      SHENNONG_API_INTERNAL_URL: http://shennong-db:8000
      NEXT_PUBLIC_SHENNONG_PUBLIC_URL: http://localhost:3000
    ports:
      - "3000:3000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
