services:
  shennong-db:
    image: ${SHENNONG_IMAGE:-zerostwo/shennong-db:0.1.0}
    restart: unless-stopped
    ports:
      - "${SHENNONG_BIND_ADDRESS:-127.0.0.1}:${SHENNONG_PORT:-8000}:8000"
    environment:
      SHENNONG_ADMIN_API_KEY: ${SHENNONG_ADMIN_API_KEY}
      SHENNONG_JWT_SECRET: ${SHENNONG_JWT_SECRET}
      SHENNONG_LOCAL_DATA_ROOT: /data
      SHENNONG_PROVIDER_DIR: /app/providers
      SHENNONG_DOWNLOAD_PROXY: ${SHENNONG_DOWNLOAD_PROXY:-}
      SHENNONG_DOWNLOAD_CONCURRENCY: ${SHENNONG_DOWNLOAD_CONCURRENCY:-8}
      SHENNONG_DOWNLOAD_TIMEOUT_SECS: ${SHENNONG_DOWNLOAD_TIMEOUT_SECS:-300}
      SHENNONG_TILEDB_MAX_CONCURRENCY: ${SHENNONG_TILEDB_MAX_CONCURRENCY:-4}
      SHENNONG_TILEDB_TIMEOUT_SECS: ${SHENNONG_TILEDB_TIMEOUT_SECS:-30}
      SHENNONG_TILEDB_MAX_STDOUT_BYTES: ${SHENNONG_TILEDB_MAX_STDOUT_BYTES:-10485760}
      SHENNONG_TILEDB_MAX_STDERR_BYTES: ${SHENNONG_TILEDB_MAX_STDERR_BYTES:-65536}
      SHENNONG_CLICKHOUSE_CONNECT_TIMEOUT_SECS: ${SHENNONG_CLICKHOUSE_CONNECT_TIMEOUT_SECS:-3}
      SHENNONG_CLICKHOUSE_TIMEOUT_SECS: ${SHENNONG_CLICKHOUSE_TIMEOUT_SECS:-15}
      SHENNONG_CLICKHOUSE_MAX_IDLE_PER_HOST: ${SHENNONG_CLICKHOUSE_MAX_IDLE_PER_HOST:-8}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${SHENNONG_DATA_PATH:-./data}:/data
      - shennong_metadata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/healthz >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

volumes:
  shennong_metadata:
