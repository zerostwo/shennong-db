services:
  shennong-db:
    image: ${SHENNONG_IMAGE:-zerostwo/shennong-db:latest}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "${SHENNONG_BIND_ADDRESS:-127.0.0.1}:${SHENNONG_PORT:-18080}:8000"
    volumes:
      - ${SHENNONG_DATA_PATH:-./data}:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
  shennong-db-web:
    image: shennong-db-webui:0.7.0
    build: ./webui
    profiles: ["development-web"]
    restart: unless-stopped
    depends_on:
      - shennong-db
    environment:
      SHENNONG_API_INTERNAL_URL: http://shennong-db:8000
      NEXT_PUBLIC_SHENNONG_PUBLIC_URL: http://localhost:3000
    ports:
      - "3000:3000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
