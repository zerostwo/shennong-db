services:
  shennong-db:
    image: zerostwo/shennong-db:latest
    restart: unless-stopped
    ports:
      - "${SHENNONG_PORT:-8000}:8000"
    environment:
      SHENNONG_ENVIRONMENT: production
      SHENNONG_DATA_ROOT: /data
      SHENNONG_LOCAL_DATA_ROOT: /data
      SHENNONG_DATABASE_PATH: /data/shennong.db
      SHENNONG_DOCS_ENABLED: "true"
    volumes:
      - ${SHENNONG_DATA_PATH:-./data}:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
