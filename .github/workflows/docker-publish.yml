name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKERHUB_IMAGE: zerostwo/shennong-db

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: zerostwo
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Keep Node 20-compatible actions happy while your token migration finishes.
      - name: Pin legacy Node runtime allowance
        run: echo "ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION=true" >> "${GITHUB_ENV}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${DOCKERHUB_IMAGE}:latest
          platforms: linux/amd64
