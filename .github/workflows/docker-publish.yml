name: Publish Docker release

on:
  push:
    tags: ["v*.*.*"]

env:
  DOCKERHUB_IMAGE: zerostwo/shennong-db
  DOCKER_METADATA_SHORT_SHA_LENGTH: 40

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: docker-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v7.0.0

      - name: Validate release version
        id: release
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must be valid SemVer (for example, v1.2.3)." >&2
            exit 1
          fi
          version="${GITHUB_REF_NAME#v}"
          stable=true
          if [[ "$version" == *-* ]]; then
            stable=false
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "stable=$stable" >> "$GITHUB_OUTPUT"

      - name: Generate OCI tags and labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ steps.release.outputs.stable == 'true' }}
            type=raw,value=stable,enable=${{ steps.release.outputs.stable == 'true' }}
            type=sha,format=long
          labels: |
            org.opencontainers.image.title=ShennongDB
            org.opencontainers.image.description=Metadata-first biological data infrastructure with a WebUI, API, and agent integrations

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: zerostwo
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push release
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.release.outputs.version }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Verify published tags
        shell: bash
        run: |
          docker buildx imagetools inspect "${DOCKERHUB_IMAGE}:${{ steps.release.outputs.version }}"
          docker buildx imagetools inspect "${DOCKERHUB_IMAGE}:sha-${GITHUB_SHA}"
          if [[ "${{ steps.release.outputs.stable }}" == "true" ]]; then
            docker buildx imagetools inspect "${DOCKERHUB_IMAGE}:latest"
            docker buildx imagetools inspect "${DOCKERHUB_IMAGE}:stable"
          fi

      - name: Generate SBOM
        uses: anchore/sbom-action@d94f46e13c6c62f59525ac9a1e147a99dc0b9bf5
        with:
          image: ${{ env.DOCKERHUB_IMAGE }}@${{ steps.build.outputs.digest }}
          artifact-name: shennongdb-${{ steps.release.outputs.version }}.spdx.json
          output-file: shennongdb.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@1aa8e0f2454b781fbf0fbf306a4c9533a0c57409

      - name: Sign image digest
        env:
          IMAGE: ${{ env.DOCKERHUB_IMAGE }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE"

      - name: Record digest
        run: echo "${{ env.DOCKERHUB_IMAGE }}@${{ steps.build.outputs.digest }}" > image-digest.txt

      - name: Upload release metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: shennongdb-${{ steps.release.outputs.version }}-metadata
          path: |
            shennongdb.spdx.json
            image-digest.txt
