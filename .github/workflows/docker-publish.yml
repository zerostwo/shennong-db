name: Publish Docker release

on:
  push:
    tags: ["v*.*.*"]

env:
  DOCKERHUB_IMAGE: zerostwo/shennong-db
  DOCKER_METADATA_SHORT_SHA_LENGTH: 40

permissions:
  contents: read

concurrency:
  group: docker-release
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    outputs:
      version: ${{ steps.release.outputs.version }}
      stable: ${{ steps.release.outputs.stable }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate tag, Cargo, and OpenAPI versions
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must be valid v-prefixed SemVer (for example, v1.2.3)." >&2
            exit 1
          fi
          version="${GITHUB_REF_NAME#v}"
          cargo_version="$(cargo metadata --locked --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "shennong-server") | .version')"
          openapi_version="$(jq -er '.info.version' openapi/shennongdb.json)"
          if [[ -z "$cargo_version" || "$cargo_version" == "null" ]]; then
            echo "Could not resolve the shennong-server Cargo package version." >&2
            exit 1
          fi
          if [[ "$version" != "$cargo_version" || "$version" != "$openapi_version" ]]; then
            echo "Release version mismatch: tag=$version cargo=$cargo_version openapi=$openapi_version" >&2
            exit 1
          fi
          stable=true
          if [[ "$version" == *-* ]]; then
            stable=false
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "stable=$stable" >> "$GITHUB_OUTPUT"

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked --workspace --all-features

      - name: Build verified release candidate
        run: docker build --tag shennong-db:release-gate --build-arg VERSION=${{ steps.release.outputs.version }} --build-arg VCS_REF=${{ github.sha }} .

      - name: Run production headless contract tests
        env:
          SHENNONG_TEST_IMAGE: shennong-db:release-gate
          SHENNONG_TEST_DB_PROFILE: headless
        run: ./scripts/test-headless-platform.sh

  release:
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate OCI tags and labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ needs.verify.outputs.stable == 'true' }}
            type=raw,value=stable,enable=${{ needs.verify.outputs.stable == 'true' }}
            type=sha,format=long
          labels: |
            org.opencontainers.image.title=ShennongDB
            org.opencontainers.image.description=Headless biomedical data plane for Shennong OS

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: zerostwo
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push release
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.verify.outputs.version }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Verify published tags
        shell: bash
        run: |
          docker buildx imagetools inspect "${DOCKERHUB_IMAGE}:${{ needs.verify.outputs.version }}"
          docker buildx imagetools inspect "${DOCKERHUB_IMAGE}:sha-${GITHUB_SHA}"
          if [[ "${{ needs.verify.outputs.stable }}" == "true" ]]; then
            docker buildx imagetools inspect "${DOCKERHUB_IMAGE}:latest"
            docker buildx imagetools inspect "${DOCKERHUB_IMAGE}:stable"
          fi

      - name: Generate SBOM
        uses: anchore/sbom-action@d94f46e13c6c62f59525ac9a1e147a99dc0b9bf5
        with:
          image: ${{ env.DOCKERHUB_IMAGE }}@${{ steps.build.outputs.digest }}
          artifact-name: shennongdb-${{ needs.verify.outputs.version }}.spdx.json
          output-file: shennongdb.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image digest
        env:
          IMAGE: ${{ env.DOCKERHUB_IMAGE }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE"

      - name: Record digest
        run: echo "${{ env.DOCKERHUB_IMAGE }}@${{ steps.build.outputs.digest }}" > image-digest.txt

      - name: Upload release metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: shennongdb-${{ needs.verify.outputs.version }}-metadata
          path: |
            shennongdb.spdx.json
            image-digest.txt
