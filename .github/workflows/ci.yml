name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features
      - name: Audit dependencies
        # jsonwebtoken records optional RSA crates in Cargo.lock, but its default
        # features are disabled and `cargo tree -i rsa` has no enabled path.
        run: cargo install cargo-audit --locked && cargo audit --ignore RUSTSEC-2023-0071
      - name: License and policy scan
        run: cargo install cargo-deny --locked && cargo deny check

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Build integration image
        run: docker build --tag shennong-db:ci --build-arg VCS_REF=${{ github.sha }} .
      - name: Vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: shennong-db:ci
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
      - name: Run platform tests
        env:
          SHENNONG_TEST_IMAGE: shennong-db:ci
        run: ./scripts/test-platform.sh

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
