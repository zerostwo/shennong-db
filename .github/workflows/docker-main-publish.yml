name: Publish Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_METADATA_SHORT_SHA_LENGTH: 40

permissions:
  contents: read

concurrency:
  group: docker-main-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Shennong DB
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate OCI tags and labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: zerostwo/shennong-db
          flavor: latest=false
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
          labels: |
            org.opencontainers.image.title=Shennong DB
            org.opencontainers.image.description=Headless biomedical data plane for Shennong OS

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: zerostwo
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=shennong-db-main
          cache-to: type=gha,mode=max,scope=shennong-db-main
          provenance: true
          sbom: true

      - name: Verify published digest
        run: docker buildx imagetools inspect "zerostwo/shennong-db@${{ steps.build.outputs.digest }}"
