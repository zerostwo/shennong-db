services:
  shennong-db:
    build: .
    image: ${SHENNONG_TEST_IMAGE:-shennong-db:test}
    restart: "no"
    ports:
      - "127.0.0.1:${SHENNONG_TEST_PORT:-18081}:8000"
    environment:
      SHENNONG_ADMIN_API_KEY: integration-test-admin-key
      SHENNONG_JWT_SECRET: integration-test-jwt-secret-with-32-bytes
      SHENNONG_LOCAL_DATA_ROOT: /data
      SHENNONG_STORAGE_BACKEND: local
      SHENNONG_PROVIDER_DIR: /app/test-providers
      SHENNONG_CORS_ORIGINS: https://allowed.example.test
      SHENNONG_MAX_BODY_BYTES: "1048576"
      SHENNONG_REQUEST_TIMEOUT_SECS: "30"
      SHENNONG_MAX_CONCURRENCY: "32"
      SHENNONG_QUERY_MAX_CONCURRENCY: "8"
      SHENNONG_QUERY_RATE_LIMIT_PER_MINUTE: "20"
      SHENNONG_DOWNLOAD_RATE_LIMIT_PER_MINUTE: "20"
      SHENNONG_TRUST_PROXY_HEADERS: "1"
      SHENNONG_DOWNLOAD_CONCURRENCY: "1"
      SHENNONG_DOWNLOAD_TIMEOUT_SECS: "30"
      SHENNONG_PROVIDER_ALLOW_UNVERIFIED: "0"
      SHENNONG_TILEDB_SCRIPT: /data/fixtures/tiledb-test.py
      SHENNONG_TILEDB_MAX_CONCURRENCY: "1"
      SHENNONG_TILEDB_TIMEOUT_SECS: "1"
      SHENNONG_TILEDB_MAX_STDOUT_BYTES: "1024"
      SHENNONG_TILEDB_MAX_STDERR_BYTES: "1024"
    volumes:
      - test_data:/data
      - ./tests/fixtures:/data/fixtures:ro
      - ./tests/providers:/app/test-providers:ro
      - ./seed:/app/seed:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/healthz >/dev/null"]
      interval: 2s
      timeout: 5s
      retries: 60
      start_period: 5s

volumes:
  test_data:
